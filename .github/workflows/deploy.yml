name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # Delegates the entire deploy (discover changed servers, sync each
    # fleet/stacks/<server>/ over SSH, bring its stacks up) to the miuops
    # reusable workflow. It is pinned to an IMMUTABLE tag, never @main: the
    # workflow holds an SSH deploy key, so a mutable ref would let an upstream
    # change take over every adopter's server. Bump this tag when you upgrade.
    uses: tianshanghong/miuops/.github/workflows/deploy.yml@v0.1.0
    secrets: inherit
