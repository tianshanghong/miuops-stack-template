name: CI — stack policy-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run the miuops stack policy-check over fleet/stacks/*
        # Use the canonical policy-check from miuops as the single source of truth — it gates
        # public/non-loopback published ports, privileged, host-namespace sharing, the default
        # bridge (docker0), missing cap_drop:[ALL], dangerous cap_add, sandbox-weakening
        # security_opt, sensitive bind-mounts, devices, and warns on un-pinned images.
        # Intentionally fetched from `main` (not a pinned ref) so this template tracks the latest
        # policy automatically. The script only reads the compose files passed as argv, and the
        # fetch is fail-closed (`-fsSL` aborts CI on any non-200 / network error).
        # The two-star glob matches the fleet layout: fleet/stacks/<server>/<stack>/.
        run: |
          python3 -m pip install --break-system-packages --quiet pyyaml
          curl -fsSL -o "$RUNNER_TEMP/stack_policy_check.py" \
            https://raw.githubusercontent.com/tianshanghong/miuops/main/tests/stack_policy_check.py
          shopt -s nullglob
          files=(fleet/stacks/*/*/docker-compose.yml fleet/stacks/*/*/compose.yml fleet/stacks/*/*/compose.yaml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No stacks to check."
            exit 0
          fi
          python3 "$RUNNER_TEMP/stack_policy_check.py" "${files[@]}"
