name: CI — stack policy-check + isolation e2e

on:
  push:
    branches: [main]
  pull_request:

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run the miuops stack policy-check
        # Use the canonical policy-check from miuops as the single source of truth — it gates
        # public/non-loopback published ports, privileged, host-namespace sharing, the default
        # bridge (docker0), missing cap_drop:[ALL], dangerous cap_add, sandbox-weakening
        # security_opt, sensitive bind-mounts, devices, and warns on un-pinned images.
        run: |
          python3 -m pip install --quiet pyyaml
          curl -fsSL -o "$RUNNER_TEMP/stack_policy_check.py" \
            https://raw.githubusercontent.com/tianshanghong/miuops/main/tests/stack_policy_check.py
          shopt -s nullglob
          files=(stacks/*/docker-compose.yml stacks/*/compose.yml stacks/*/compose.yaml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No stacks to check."
            exit 0
          fi
          python3 "$RUNNER_TEMP/stack_policy_check.py" "${files[@]}"

  lateral-isolation-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create two stacks on separate per-stack bridges
        run: |
          docker network create alpha_internal
          docker network create beta_internal

          docker run -d --name alpha --network alpha_internal traefik/whoami
          docker run -d --name beta --network beta_internal traefik/whoami

      - name: Verify lateral movement between stacks is blocked
        run: |
          sleep 3
          # alpha must NOT reach beta — they sit on separate per-stack bridges.
          if docker exec alpha wget -q -O- --timeout=3 http://beta:80 2>/dev/null; then
            echo "FAIL: alpha can reach beta — lateral movement NOT blocked"
            exit 1
          fi
          echo "alpha cannot reach beta — lateral movement blocked"

          # beta must NOT reach alpha either.
          if docker exec beta wget -q -O- --timeout=3 http://alpha:80 2>/dev/null; then
            echo "FAIL: beta can reach alpha — lateral movement NOT blocked"
            exit 1
          fi
          echo "beta cannot reach alpha — lateral movement blocked"

      - name: Cleanup
        if: always()
        run: |
          docker rm -f alpha beta 2>/dev/null || true
          docker network rm alpha_internal beta_internal 2>/dev/null || true
