# Ansible-style inventory of your servers. `miuops up <server> <domain...>`
# writes the real host line here when you bootstrap a server; until then this is
# a commented placeholder. Each line maps a server handle to its address and SSH
# user. This is plaintext CONFIG (not a secret) and is committed.
#
# Example (uncomment and edit, or let `miuops up` write it for you):
# server-01 ansible_host=203.0.113.10 ansible_user=root
